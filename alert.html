<!doctype html>
<html lang="ja" data-page="alert">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SPARKLECHAT — Alert Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&family=M+PLUS+Rounded+1c:wght@700;800&family=Zen+Kaku+Gothic+New:wght@700;900&family=Noto+Sans+JP:wght@700;900&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="alert.css">
</head>
<body>
  <div class="stage pos-bc" id="stage">
    <div class="bubble" id="bubble">
      <div class="bubble__body">
        <span class="bubble__badge"><i class="bubble__icon" id="icon"></i></span>
        <div class="bubble__text">
          <p class="bubble__title" id="title"></p>
          <p class="bubble__msg" id="msg"></p>
          <p class="bubble__detail" id="detail"></p>
        </div>
      </div>
      <span class="bubble__tail"></span>
    </div>
  </div>
  <script type="module">
    try{const m=await import('./vendor/tmi.bundle.mjs');window.tmi={Client:m.Client,client:m.client};}
    catch(e){console.warn('[sparklechat] tmi bundle not loaded',e);}
    await import('./alert.js');
  </script>
</body>
</html>
