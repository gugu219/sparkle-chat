<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sparkle Chat Widget</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-selene nf-mplus-rounded bf-zen-kaku-gothic bg-gradient">

  <div class="chat" id="chat"></div>

  <template id="tpl-message">
    <div class="msg">
      <div class="msg__spark"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.6c.6 6 1 6.6 8.8 9.4C13 13.8 12.6 14.4 12 20.4 11.4 14.4 11 13.8 3.2 11 11 8.2 11.4 7.6 12 1.6Z"/></svg></div>
      <div class="msg__head">
        <span class="badge"></span>
        <span class="msg__name"></span>
      </div>
      <div class="msg__bubble"></div>
    </div>
  </template>

  <template id="tpl-alert">
    <div class="msg">
      <div class="alert">
        <div class="alert__spark" style="top:8px;right:14px"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1.6c.6 6 1 6.6 8.8 9.4C13 13.8 12.6 14.4 12 20.4 11.4 14.4 11 13.8 3.2 11 11 8.2 11.4 7.6 12 1.6Z"/></svg></div>
        <div class="alert__kind"></div>
        <div class="alert__line"></div>
        <div class="alert__note"></div>
      </div>
    </div>
  </template>

  <script src="script.js"></script>
</body>
</html>
