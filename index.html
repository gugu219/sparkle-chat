<!doctype html>
<html lang="ja" data-page="editor">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SPARKLECHAT — OBS Widget Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@500;700;800&family=Zen+Maru+Gothic:wght@500;700;900&family=Kosugi+Maru&family=Shippori+Mincho:wght@500;700;800&family=Zen+Old+Mincho:wght@400;700;900&family=DotGothic16&family=Yuji+Syuku&family=Klee+One:wght@400;600&family=Inter:wght@400;500;700;800&family=Poppins:wght@400;500;700;800&family=Space+Grotesk:wght@400;500;700&family=Playfair+Display:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-shell theme-selene">
  <header class="app-header">
    <a class="brand" href="./"><span class="brand__mark">✦</span><span>SPARKLE<small>CHAT</small></span></a>
    <span class="app-header__status"><i></i> Live widget generator</span>
  </header>

  <main class="editor-layout">
    <section class="control-panel" aria-label="ウィジェット設定">
      <form id="widget-form" class="settings-form">
        <fieldset>
          <legend>CHANNEL</legend>
          <div class="field">
            <label class="field-label" for="channel">Twitch チャンネル名</label>
            <div class="input-with-prefix"><span>twitch.tv/</span><input id="channel" name="channel" autocomplete="off" placeholder="your_channel" pattern="[A-Za-z0-9_]+"></div>
          </div>
          <p class="field-hint">ログイン不要でそのまま利用できます。</p>
        </fieldset>

        <fieldset>
          <legend>APPEARANCE</legend>
          <div class="field-grid">
            <label class="field-label">テーマ<select name="theme"><option value="selene">Sélène — Violet</option><option value="rose">Rosé — Pink</option><option value="aurora">Aurora — Mint</option></select></label>
            <label class="field-label">フォント<select name="font">
              <optgroup label="日本語">
                <option value="zen">Zen Kaku Gothic</option>
                <option value="noto">Noto Sans JP</option>
                <option value="rounded">M PLUS Rounded</option>
                <option value="maru">Zen Maru Gothic</option>
                <option value="kosugi">Kosugi Maru</option>
                <option value="shippori">Shippori Mincho</option>
                <option value="oldmincho">Zen Old Mincho</option>
                <option value="dot">DotGothic16</option>
                <option value="yuji">Yuji Syuku</option>
                <option value="klee">Klee One</option>
              </optgroup>
              <optgroup label="English">
                <option value="inter">Inter</option>
                <option value="poppins">Poppins</option>
                <option value="grotesk">Space Grotesk</option>
                <option value="playfair">Playfair Display</option>
                <option value="pixel">VT323</option>
              </optgroup>
              <optgroup label="その他"><option value="system">System Sans</option></optgroup>
            </select></label>
          </div>
          <div class="field">
            <span class="field-label">背景モード</span>
            <div class="segmented" role="group" aria-label="背景モード">
              <label><input type="radio" name="bg" value="glass" checked><span>Glass</span></label>
              <label><input type="radio" name="bg" value="clear"><span>透過</span></label>
              <label><input type="radio" name="bg" value="black"><span>黒</span></label>
            </div>
          </div>
          <div class="range-row"><label class="field-label" for="opacity">背景の濃さ <output id="opacity-value">78%</output></label><input id="opacity" name="opacity" type="range" min="25" max="100" value="78"></div>
          <div class="field">
            <span class="field-label">メッセージのマーカー</span>
            <div class="segmented" role="group" aria-label="マーカー">
              <label><input type="radio" name="node" value="dot" checked><span>●</span></label>
              <label><input type="radio" name="node" value="heart"><span>♥&#xFE0E;</span></label>
              <label><input type="radio" name="node" value="star"><span>★&#xFE0E;</span></label>
              <label><input type="radio" name="node" value="spark"><span>✦</span></label>
            </div>
          </div>
          <div class="field-grid compact"><label class="field-label">文字サイズ (px)<input class="field-num" type="number" name="textSize" min="8" max="80" step="1" value="15" inputmode="numeric"></label><label class="field-label">表示件数<input class="field-num" type="number" name="limit" min="1" max="200" step="1" value="12" inputmode="numeric"></label></div>
          <div class="range-row"><label class="field-label" for="wrap">1行の最大文字数 <output id="wrap-value">40</output></label><input id="wrap" name="wrap" type="range" min="12" max="60" value="40"></div>
          <label class="toggle"><input type="checkbox" name="blur" checked><span class="toggle__track"></span><span>ガラスぼかし（高負荷時はOFF）</span></label>
          <div class="field">
            <span class="field-label">認識バッジ（サブ / モデ / VIP）</span>
            <div class="segmented" role="group" aria-label="認識バッジ表示">
              <label><input type="radio" name="badgeStyle" value="image" checked><span>画像</span></label>
              <label><input type="radio" name="badgeStyle" value="pill"><span>文字のみ</span></label>
            </div>
          </div>
          <label class="toggle"><input type="checkbox" name="extras" checked><span class="toggle__track"></span><span>その他のバッジも表示（Bits・ギフター等）</span></label>
        </fieldset>

        <fieldset class="publish-box"><legend>PUBLISH</legend>
          <label class="field-label" for="obs-url">OBSブラウザソース</label>
          <button type="button" id="copy-url" class="apply-btn">これらの設定をURLに反映してコピー</button>
          <div class="url-output"><input id="obs-url" readonly aria-label="OBSブラウザソース URL"></div>
          <p class="field-hint">OBSのブラウザソースに貼り付け、幅440px前後でご利用ください。</p>
        </fieldset>
      </form>
    </section>

    <section class="preview-panel" aria-label="リアルタイムプレビュー">
      <div class="preview-toolbar"><div><p class="eyebrow">LIVE PREVIEW</p><h2>OBS表示イメージ</h2></div><span id="connection-status" class="status-chip">匿名表示 · ログイン不要</span></div>
      <div class="preview-stage"><div class="checkerboard"></div><iframe id="widget-preview" title="ウィジェットプレビュー"></iframe><div class="preview-corner preview-corner--tl"></div><div class="preview-corner preview-corner--br"></div></div>
      <div class="test-controls"><span>TEST EVENT</span><button type="button" data-test="message">チャット</button><button type="button" data-test="sub">サブスク</button><button type="button" data-test="gift">サブギフト</button><button type="button" data-test="cheer">Bits</button><button type="button" data-test="highlight">強調</button></div>
    </section>
  </main>
  <div id="toast" class="toast" role="status"></div>
  <script src="script.js"></script>
</body>
</html>
