<!doctype html>
<html lang="ja" data-page="view">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prism Chat — OBS View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="widget theme-selene bg-glass">
  <main id="chat" class="chat-stack" aria-live="polite"></main>
  <template id="message-template"><article class="chat-message"><i class="chat-message__node" aria-hidden="true"></i><header><span class="role-badge"></span><span class="chat-message__name"></span></header><div class="chat-message__bubble"></div></article></template>
  <template id="alert-template"><article class="chat-alert"><i class="chat-message__node" aria-hidden="true"></i><div class="chat-alert__border"><div class="chat-alert__surface"><p class="chat-alert__kind"></p><p class="chat-alert__line"></p><p class="chat-alert__note"></p><span class="chat-alert__spark">✦</span></div></div></article></template>
  <script src="https://unpkg.com/tmi.js@1.8.5/dist/tmi.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
